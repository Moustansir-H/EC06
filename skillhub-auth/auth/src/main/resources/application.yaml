spring:
  application:
    name: auth
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

auth:
  security:
    master-key: ${APP_MASTER_KEY:tp3-demo-server-master-key}
    timestamp-window-seconds: 60
    nonce-ttl-seconds: 120
    token-ttl-seconds: 900
  backend-sync:
    base-url: ${BACKEND_API_URL:http://127.0.0.1:8000/api}
    sync-secret: ${AUTH_INTERNAL_SYNC_SECRET:skillhub-sync-secret}
