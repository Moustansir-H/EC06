spring:
  application:
    name: auth
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://127.0.0.1:3306/db-skillhub-auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update

auth:
  cors:
    allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    master-key: ${APP_MASTER_KEY:42b626da29b4a97d381beaf7eae055549cd87ca7872e1f6004954b117c40fdf7}
    timestamp-window-seconds: 60
    nonce-ttl-seconds: 120
    token-ttl-seconds: 900
  backend-sync:
    base-url: ${BACKEND_API_URL:http://127.0.0.1:8000/api}
    sync-secret: ${AUTH_INTERNAL_SYNC_SECRET:skillhub-sync-secret}
