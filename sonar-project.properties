sonar.projectKey=Moustansir-H_EC06
sonar.organization=moustansir-h
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Sources: Backend + Auth only (Frontend excluded)
sonar.sources=skillhub-back/app,skillhub-back/routes,skillhub-back/bootstrap,skillhub-back/config,skillhub-back/database,skillhub-auth/auth/src/main/java

# Tests: Backend + Auth only
sonar.tests=skillhub-back/tests,skillhub-auth/auth/src/test

sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/storage/**,\
  **/bootstrap/cache/**,\
  skillhub-back/public/**,\
  skillhub-auth/auth/target/**

sonar.coverage.exclusions=\
  **/database/migrations/**, \
  **/database/seeders/**, \
  **/database/factories/**, \
  **/bootstrap/**, \
  **/config/**, \
  **/routes/**, \
  skillhub-back/app/Http/Controllers/**, \
  skillhub-back/app/Http/Middleware/**, \
  skillhub-back/app/Services/**, \
  skillhub-back/app/Providers/**, \
  skillhub-auth/auth/src/main/java/**/config/**, \
  skillhub-auth/auth/src/main/java/**/entity/**, \
  skillhub-auth/auth/src/main/java/**/AuthApplication.java, \
  skillhub-auth/auth/src/main/java/**/service/BackendSyncService.java, \
  skillhub-auth/auth/src/main/java/**/service/BackendSyncProperties.java, \
  skillhub-auth/auth/src/main/java/**/service/PasswordHasher.java

sonar.test.inclusions=skillhub-back/tests/**/*.php,skillhub-auth/auth/src/test/**/*.java

# Coverage reports
sonar.php.coverage.reportPaths=skillhub-back/coverage/clover.xml
sonar.java.coverage.reportPaths=skillhub-auth/auth/target/site/jacoco/jacoco.xml

# Java bytecode required by Sonar Java sensor
sonar.java.binaries=skillhub-auth/auth/target/classes
sonar.java.test.binaries=skillhub-auth/auth/target/test-classes
sonar.java.libraries=skillhub-auth/auth/target/dependency/*.jar