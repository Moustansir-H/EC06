services:
  mysql:
    image: mysql:8.4
    container_name: skillhub-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-skillhub}
      MYSQL_USER: ${DB_USERNAME:-skillhub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-skillhub}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u$${MYSQL_USER}", "-p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ./skillhub-auth/auth
      dockerfile: Dockerfile
    container_name: skillhub-auth
    environment:
      APP_MASTER_KEY: ${APP_MASTER_KEY:-change-me-master-key}
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000/api}
      AUTH_INTERNAL_SYNC_SECRET: ${AUTH_INTERNAL_SYNC_SECRET:-change-me-sync-secret}
    ports:
      - "${AUTH_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./skillhub-back
      dockerfile: Dockerfile
    container_name: skillhub-backend
    environment:
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-skillhub}
      DB_USERNAME: ${DB_USERNAME:-skillhub}
      DB_PASSWORD: ${DB_PASSWORD:-skillhub}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth:8080/api}
      AUTH_INTERNAL_SYNC_SECRET: ${AUTH_INTERNAL_SYNC_SECRET:-change-me-sync-secret}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./skillhub-back:/var/www/html
      - backend-vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./skillhub-front
      dockerfile: Dockerfile
    container_name: skillhub-frontend
    profiles: ["frontend"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./skillhub-front:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql-data:
  backend-vendor:
  frontend-node-modules:
